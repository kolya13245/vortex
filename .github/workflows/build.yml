name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main

env:
  MIHOMO_VERSION: v1.19.10
  XRAY_VERSION: v25.3.6

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            mihomo_asset: mihomo-windows-amd64
            xray_asset: Xray-windows-64
            ext: .exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            mihomo_asset: mihomo-linux-amd64
            xray_asset: Xray-linux-64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download Mihomo
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          ASSET="${{ matrix.mihomo_asset }}-${MIHOMO_VERSION}"
          URL="https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/${ASSET}.gz"
          echo "Downloading $URL"
          curl -L "$URL" -o /tmp/mihomo.gz
          gunzip -f /tmp/mihomo.gz
          mv /tmp/mihomo src-tauri/bin/mihomo${{ matrix.ext }}
          chmod +x src-tauri/bin/mihomo${{ matrix.ext }}

      - name: Download Xray
        shell: bash
        run: |
          ASSET="${{ matrix.xray_asset }}"
          URL="https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/${ASSET}.zip"
          echo "Downloading $URL"
          curl -L "$URL" -o /tmp/xray.zip
          cd /tmp && unzip -o xray.zip -d xray-extract
          mv /tmp/xray-extract/xray${{ matrix.ext }} src-tauri/bin/xray${{ matrix.ext }}
          chmod +x src-tauri/bin/xray${{ matrix.ext }} || true

      - name: Verify binaries
        shell: bash
        run: |
          ls -la src-tauri/bin/
          src-tauri/bin/mihomo${{ matrix.ext }} -v || true
          src-tauri/bin/xray${{ matrix.ext }} version || true

      - run: pnpm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Vortex ${{ github.ref_name }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vortex-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
          if-no-files-found: warn
