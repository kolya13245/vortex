name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main

env:
  MIHOMO_VERSION: v1.19.10
  XRAY_VERSION: v25.3.6

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Download Mihomo (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p src-tauri/bin
          URL="https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          echo "Downloading $URL"
          curl -fSL "$URL" -o /tmp/mihomo.gz
          gunzip -f /tmp/mihomo.gz
          mv /tmp/mihomo src-tauri/bin/mihomo
          chmod +x src-tauri/bin/mihomo

      - name: Download Mihomo (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p src-tauri/bin
          URL="https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-windows-amd64-${MIHOMO_VERSION}.zip"
          echo "Downloading $URL"
          curl -fSL "$URL" -o mihomo.zip
          unzip -o mihomo.zip -d mihomo-extract
          mv mihomo-extract/mihomo-windows-amd64.exe src-tauri/bin/mihomo.exe || mv mihomo-extract/mihomo*.exe src-tauri/bin/mihomo.exe
          rm -rf mihomo.zip mihomo-extract

      - name: Download Xray (Linux)
        if: runner.os == 'Linux'
        run: |
          URL="https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-linux-64.zip"
          echo "Downloading $URL"
          curl -fSL "$URL" -o /tmp/xray.zip
          mkdir -p /tmp/xray-extract
          unzip -o /tmp/xray.zip -d /tmp/xray-extract
          mv /tmp/xray-extract/xray src-tauri/bin/xray
          chmod +x src-tauri/bin/xray

      - name: Download Xray (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          URL="https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-windows-64.zip"
          echo "Downloading $URL"
          curl -fSL "$URL" -o xray.zip
          mkdir -p xray-extract
          unzip -o xray.zip -d xray-extract
          mv xray-extract/xray.exe src-tauri/bin/xray.exe
          rm -rf xray.zip xray-extract

      - name: Verify binaries
        shell: bash
        run: ls -la src-tauri/bin/

      - run: pnpm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Vortex {0}', github.ref_name) || '' }}
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vortex-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis*
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
          if-no-files-found: warn
